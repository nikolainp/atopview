<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <title>/*{{.Title}}*/</title>

        <link rel="stylesheet" href="/static/style.css">
        <link rel="stylesheet" href="https://cdn.datatables.net/2.3.7/css/dataTables.dataTables.min.css">
        <link rel="stylesheet" href="https://cdn.datatables.net/rowgroup/1.6.0/css/rowGroup.dataTables.min.css">

        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
        <link rel="stylesheet" href="https://cdn.datatables.net/2.3.6/css/dataTables.dataTables.css" />
        <script src="https://cdn.datatables.net/2.3.6/js/dataTables.js"></script>
        <script src="https://cdn.datatables.net/rowgroup/1.6.0/js/dataTables.rowGroup.min.js"></script>

        <script type="text/javascript">
            var dataTable;
            var collapsedGroups = {};

            function plotOnLoad(){
                plotTable();
            }

            function plotTable() {
                dataTable = new DataTable('#countersTable', {
                    paging: false,
                    info: true,
                    searching: true,
					ajax: {
    				    url: '/data/counters/',
        				dataSrc: ''
    				},
                    rowId: 'ID',
					columns: [
						{ title: "N", data: 'Enable' },
						{ title: "FullName", data: 'FullName' },
						{ title: "Label", data: 'Label' },
						{ title: "Name", data: 'Name' },
						{ title: "SubName", data: 'SubName' },
						{ title: "Description", data: 'Description' }
					],
                    order: [['Label', 'asc']],
                    rowGroup: {
                        dataSrc: 'Label',
                        startRender: function (rows, group) {
                            var collapsed = !!collapsedGroups[group];

                            rows.nodes().each(function (r) {
                                r.style.display = collapsed ? 'none' : '';
                            });    

                            // Add category name to the <tr>. NOTE: Hardcoded colspan
                            return $('<tr/>')
                                .append('<td colspan="8">' + group + ' (' + rows.count() + ')</td>')
                                .attr('data-name', group)
                                .toggleClass('collapsed', collapsed);
                        }
                    },
                    "columnDefs": [
                        {
                            "targets": 0,
                            'render': function(data, type, full, meta) {
                                if (data === "enable" || data === true) {
                                    return '<input type="checkbox" checked="checked" class="checkbox_check">';
                                } else {
                                    return '<input type="checkbox"   class="checkbox_check">';
                                }
                            }
                        }
                    ]
                });

                dataTable.on('click', 'tr.dtrg-start', function () {
                    var name = $(this).data('name');
                    collapsedGroups[name] = !collapsedGroups[name];
                    console.log('collapse: ' + name);
                    dataTable.draw(false);
                });  

                dataTable.on('change', 'input[type="checkbox"]', function() {
                    let $row = $(this).closest('tr');
                    let rowData = dataTable.row($row).data();
                    let cellData = this.checked;

                    $.ajax({
                        url: '/data/counters/',
                        type: 'POST',
                        data: {},
                        dataType: 'json',
                        beforeSend: function(xhr) {
                            xhr.setRequestHeader("id", rowData.ID);
                            xhr.setRequestHeader("active", cellData);
                        },
                        success: function(response) {
                            console.log(response);
                        },
                        fail: function(jqXHR, textStatus, errorThrown) {
                            console.error("Error status:", textStatus);
                            console.error("Error message:", errorThrown);
                            console.error("Response text:", jqXHR.responseText); 
                        }
                    });
                });
            }

    </script>

    </head>
    <body onLoad="plotOnLoad()">
        /*{{.MainMenu}}*/

        <table id="countersTable" class="display">
        </table>
    </body>
</html>
